name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
  push:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: moonrepo/setup-rust@abb2d32350334249b178c401e5ec5836e0cd88d3 # v1
        with:
          components: rustfmt
          channel: nightly
          bins: cargo-deny

      - name: Check formatting
        run: cargo +nightly fmt --check

      - name: Run cargo-deny
        run: cargo deny check --hide-inclusion-graph
        if: github.ref == 'refs/heads/main'

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: frontend
        run: npm clean-install

      - name: Prettier
        working-directory: frontend
        run: npm run ci

  build-docker-dev:
    needs:
      - backend-test
      - frontend-test
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: true
      group: "${{ github.ref }}-dev"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build docker dev images
        run: python3 tools.py build


  build-docker:
    needs:
      - backend-test
      - frontend-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' ||  startsWith(github.ref, 'refs/tags/') )
    concurrency:
      cancel-in-progress: true
      group: "${{ github.ref }}-prod"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build docker images
        run: python3 tools.py prod build --push
